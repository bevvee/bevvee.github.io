<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Amine El Aazzouzi · Software Engineer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }

  #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

  #name-top {
    position: absolute;
    top: 24px; left: 28px;
    font-size: 11px;
    letter-spacing: 4px;
    color: #444;
    text-transform: uppercase;
    pointer-events: none;
  }

  #hero-text {
    position: absolute;
    top: 50%;
    left: 5%;
    transform: translateY(-50%);
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #hero-text .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    color: #00ffc8;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #hero-text .eyebrow::before {
    content: '';
    display: block;
    width: 30px; height: 1px;
    background: #00ffc8;
  }
  #hero-text h1 {
    font-size: clamp(32px, 5vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: -2px;
  }
  #hero-text h1 .accent { color: #00ffc8; }
  #hero-text .role {
    margin-top: 16px;
    font-size: 13px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #hero-text .company {
    margin-top: 6px;
    font-size: 12px;
    color: #444;
    letter-spacing: 1px;
  }
  #hero-text .company span { color: #00ffc8; }

  #scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    transition: opacity 0.5s;
    animation: bob 2.5s infinite ease-in-out;
  }
  @keyframes bob {
    0%,100%{ transform: translateX(-50%) translateY(0); }
    50%{ transform: translateX(-50%) translateY(8px); }
  }
  #scroll-hint svg { display: block; margin: 6px auto 0; opacity: 0.3; }

  #section-label {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,255,200,0.07);
    border: 1px solid rgba(0,255,200,0.25);
    color: #00ffc8;
    padding: 6px 22px;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    border-radius: 30px;
    opacity: 0;
    transition: opacity 0.5s ease;
    white-space: nowrap;
  }

  #info-panel {
    position: absolute;
    right: 4%;
    top: 50%;
    transform: translateY(-50%);
    width: 310px;
    background: rgba(4,4,18,0.88);
    border: 1px solid rgba(0,255,200,0.15);
    border-radius: 18px;
    padding: 26px 24px;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: auto;
    backdrop-filter: blur(16px);
    max-height: 88vh;
    overflow-y: auto;
  }
  #info-panel::-webkit-scrollbar { width: 3px; }
  #info-panel::-webkit-scrollbar-track { background: transparent; }
  #info-panel::-webkit-scrollbar-thumb { background: #00ffc822; border-radius: 2px; }

  #info-panel h2 {
    font-size: 16px;
    font-weight: 800;
    color: #00ffc8;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  #info-panel .sub {
    font-size: 10px;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .skill-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 9px 0;
  }
  .skill-name { font-size: 11px; color: #aaa; width: 72px; flex-shrink: 0; }
  .skill-bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .skill-bar { height: 3px; border-radius: 2px; background: linear-gradient(90deg, #00ffc8, #0099ff); }
  .skill-pct { font-size: 10px; color: #00ffc8; width: 30px; text-align: right; flex-shrink: 0; }

  .proj-card {
    background: rgba(0,255,200,0.03);
    border: 1px solid rgba(0,255,200,0.1);
    border-radius: 12px;
    padding: 13px 14px;
    margin: 9px 0;
    transition: border-color 0.3s;
  }
  .proj-card:hover { border-color: rgba(0,255,200,0.3); }
  .proj-card h3 { font-size: 12px; color: #eee; margin-bottom: 5px; font-weight: 600; }
  .proj-card p { font-size: 11px; color: #666; line-height: 1.6; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .chip {
    font-size: 9px;
    padding: 2px 9px;
    border-radius: 20px;
    background: rgba(0,255,200,0.08);
    color: #00ffc8;
    border: 1px solid rgba(0,255,200,0.18);
    letter-spacing: 0.5px;
  }

  .exp-item {
    border-left: 2px solid #00ffc8;
    padding-left: 14px;
    margin: 14px 0;
  }
  .exp-item h3 { font-size: 12px; color: #fff; font-weight: 700; }
  .exp-item .date { font-size: 10px; color: #00ffc8; margin: 3px 0; letter-spacing: 1px; }
  .exp-item p { font-size: 11px; color: #666; line-height: 1.5; }

  .cert-card {
    background: rgba(255,170,0,0.04);
    border: 1px solid rgba(255,170,0,0.15);
    border-radius: 12px;
    padding: 13px 14px;
    margin: 9px 0;
  }
  .cert-card h3 { font-size: 12px; color: #ffd060; font-weight: 600; margin-bottom: 5px; }
  .cert-card p { font-size: 11px; color: #666; line-height: 1.6; }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
    color: #888;
  }
  .contact-row .icon { font-size: 14px; width: 20px; text-align: center; }
  .contact-row a { color: #00ffc8; text-decoration: none; font-size: 11px; }
  .contact-row a:hover { text-decoration: underline; }

  #scroll-progress {
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 20;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    pointer-events: auto;
    transition: background 0.3s, transform 0.3s, height 0.3s;
    border: 1px solid transparent;
  }
  .dot.active {
    background: #00ffc8;
    transform: scale(1.5);
    border-color: rgba(0,255,200,0.3);
    box-shadow: 0 0 8px rgba(0,255,200,0.5);
  }

  #section-nav {
    position: absolute;
    bottom: 32px;
    right: 4%;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: auto;
  }
  .nav-btn {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    background: rgba(5,5,20,0.7);
    color: #666;
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-btn:hover { border-color: #00ffc8; color: #00ffc8; }
  .nav-btn.active-btn { border-color: #00ffc8; color: #00ffc8; background: rgba(0,255,200,0.05); }

  #loading-screen {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: #0a0a0f;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1s ease;
  }
  #loading-screen .load-name {
    font-size: 11px;
    letter-spacing: 6px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  #loading-bar-bg {
    width: 200px; height: 1px;
    background: rgba(255,255,255,0.05);
  }
  #loading-bar {
    height: 1px;
    background: linear-gradient(90deg, #00ffc8, #0099ff);
    width: 0%;
    transition: width 0.1s;
  }
  #loading-screen .load-pct {
    margin-top: 14px;
    font-size: 10px;
    color: #00ffc8;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-name">Loading Portfolio</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div class="load-pct" id="load-pct">0%</div>
</div>

<div id="canvas-container"></div>

<div id="ui">
  <div id="name-top">M.A. El Aazzouzi · 2025</div>
  <div id="section-label">Exploring the Room</div>

  <div id="hero-text">
    <div class="eyebrow">Software Engineer · 21 · Morocco</div>
    <h1>Mohammed<br>Amine<br><span class="accent">El Aazzouzi</span></h1>
    <div class="role">Mobile &amp; Web Developer</div>
    <div class="company">@ <span>Sima Code</span> · Since Sep 2024</div>
  </div>

  <div id="info-panel"></div>

  <div id="scroll-hint">
    Scroll to explore
    <svg width="14" height="20" viewBox="0 0 14 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="12" height="18" rx="6" stroke="white" stroke-width="1.5"/>
      <circle cx="7" cy="6" r="1.5" fill="white"/>
    </svg>
  </div>

  <div id="section-nav">
    <div class="nav-btn" onclick="goTo(0)">Intro</div>
    <div class="nav-btn" onclick="goTo(1)">Projects</div>
    <div class="nav-btn" onclick="goTo(2)">Skills</div>
    <div class="nav-btn" onclick="goTo(3)">Certs</div>
  </div>
</div>

<div id="scroll-progress">
  <div class="dot active" onclick="goTo(0)" title="Home"></div>
  <div class="dot" onclick="goTo(1)" title="Projects"></div>
  <div class="dot" onclick="goTo(2)" title="Skills"></div>
  <div class="dot" onclick="goTo(3)" title="Certificates"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Loading ────────────────────────────────────────────────────────
let loadPct = 0;
const loadBar = document.getElementById('loading-bar');
const loadPctEl = document.getElementById('load-pct');
const loadScreen = document.getElementById('loading-screen');
const loadInterval = setInterval(()=>{
  loadPct += Math.random()*15;
  if(loadPct>=100){ loadPct=100; clearInterval(loadInterval); setTimeout(()=>{ loadScreen.style.opacity='0'; setTimeout(()=>loadScreen.remove(),1000); },300); }
  loadBar.style.width=loadPct+'%';
  loadPctEl.textContent=Math.floor(loadPct)+'%';
},120);

// ── Renderer ────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.065);
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 60);
camera.position.set(0, 2.2, 7.5);
const lookTarget = new THREE.Vector3(0, 1.1, 0);
camera.lookAt(lookTarget);

// ── Helpers ─────────────────────────────────────────────────────────
const mat = (color, metalness=0, roughness=0.8, emissive=null, emissiveIntensity=0) => {
  const m = new THREE.MeshStandardMaterial({color, metalness, roughness});
  if(emissive){ m.emissive = new THREE.Color(emissive); m.emissiveIntensity = emissiveIntensity; }
  return m;
};
const BOX = (w,h,d,m) => new THREE.Mesh(new THREE.BoxGeometry(w,h,d), m);
const CYL = (rt,rb,h,seg,m) => new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), m);
const SPH = (r,seg,m) => new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg), m);

function mkBox(w,h,d,color,mx=0,rx=0.8){ return BOX(w,h,d,mat(color,mx,rx)); }
function mkCyl(rt,rb,h,s,color,mx=0,rx=0.7){ return CYL(rt,rb,h,s,mat(color,mx,rx)); }

// ── Lighting ─────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223366, 0.5));

const pLight = new THREE.PointLight(0x00ffd5, 2.0, 14);
pLight.position.set(-2, 5, 1); pLight.castShadow=true;
pLight.shadow.mapSize.set(512,512);
scene.add(pLight);

const warmL = new THREE.PointLight(0xff8833, 1.0, 10);
warmL.position.set(4, 3, -2); scene.add(warmL);

const rimL = new THREE.DirectionalLight(0x5533ff, 0.3);
rimL.position.set(-6, 6, -6); scene.add(rimL);

const screenGlowL = new THREE.PointLight(0x0044cc, 1.2, 4);
screenGlowL.position.set(1.5, 2.2, -3.5); scene.add(screenGlowL);

const lampL = new THREE.PointLight(0xffddaa, 0.9, 5);
lampL.position.set(-3, 2.2, -3.8); scene.add(lampL);

// ── Floor ─────────────────────────────────────────────────────────
const floor = mkBox(22,0.1,22, 0x0d0d1e, 0, 0.95);
floor.position.y=-0.05; floor.receiveShadow=true; scene.add(floor);
for(let x=-5;x<=5;x++) for(let z=-5;z<=5;z++){
  const t = mkBox(0.97,0.008,0.97, (x+z)%2===0?0x121228:0x0e0e22, 0, 1);
  t.position.set(x,0.001,z); scene.add(t);
}

// ── Ceiling ────────────────────────────────────────────────────────
const ceiling = mkBox(22,0.1,22,0x080814,0,1);
ceiling.position.y=5.95; scene.add(ceiling);

// ── Walls ──────────────────────────────────────────────────────────
const backWall = mkBox(14,7,0.15,0x0c0c1e,0,1);
backWall.position.set(0,3.5,-5.5); scene.add(backWall);
const leftWall = mkBox(0.15,7,14,0x0a0a1c,0,1);
leftWall.position.set(-6,3.5,0); scene.add(leftWall);
const rightWall = mkBox(0.15,7,14,0x0a0a1c,0,1);
rightWall.position.set(6,3.5,0); scene.add(rightWall);

// Wall accent lines (back)
for(let i=0;i<6;i++){
  const vl = mkBox(0.015,5,0.01,0x00ffc8,0,0);
  vl.material.emissive=new THREE.Color(0x00ffc8); vl.material.emissiveIntensity=0.15;
  vl.position.set(-5+i*2,2.5,-5.43); scene.add(vl);
}

// Ceiling LED strip
for(let x=-5.5;x<=5.5;x+=0.25){
  const led = SPH(0.018,4,mat(0x00ffc8,0,0,0x00ffc8,1.8));
  led.position.set(x,5.88,-4.8); scene.add(led);
}
// Side led strip (left)
for(let z=-5;z<=-2;z+=0.25){
  const led = SPH(0.016,4,mat(0x7733ff,0,0,0x7733ff,1.5));
  led.position.set(-5.93,0.08,z); scene.add(led);
}

// ── Rug ───────────────────────────────────────────────────────────
const rug = mkBox(3.2,0.025,2.2,0x2a0033,0,0.95);
rug.position.set(-0.2,0.008,0.2); scene.add(rug);
const rugIn = mkBox(2.8,0.026,1.8,0x3d0055,0,0.9);
rugIn.position.set(-0.2,0.009,0.2); scene.add(rugIn);
// Rug pattern lines
for(let i=-1;i<=1;i++){
  const rl = mkBox(2.7,0.027,0.015,0x00ffc8,0,0);
  rl.material.emissive=new THREE.Color(0x00ffc8); rl.material.emissiveIntensity=0.08;
  rl.position.set(-0.2,0.01,0.2+i*0.6); scene.add(rl);
}

// ── Desk ──────────────────────────────────────────────────────────
const deskG = new THREE.Group();
const dTop = mkBox(2.6,0.09,1.05,0x261508,0,0.5); dTop.position.y=0.94; dTop.castShadow=true; deskG.add(dTop);
const dEdge = mkBox(2.6,0.02,0.015,0x00ffc8,0,0);
dEdge.material.emissive=new THREE.Color(0x00ffc8); dEdge.material.emissiveIntensity=0.5;
dEdge.position.set(0,0.945,-0.52); deskG.add(dEdge);
const dEdgeF = mkBox(2.6,0.02,0.015,0x00ffc8,0,0);
dEdgeF.material.emissive=new THREE.Color(0x00ffc8); dEdgeF.material.emissiveIntensity=0.15;
dEdgeF.position.set(0,0.945,0.52); deskG.add(dEdgeF);
// Legs
[[1.2,-0.48],[1.2,0.42],[-1.2,-0.48],[-1.2,0.42]].forEach(([x,z])=>{
  const lg = mkBox(0.065,0.92,0.065,0x1a0c04,0,0.8); lg.position.set(x,0.46,z); lg.castShadow=true; deskG.add(lg);
});
// Cable management box
const cable = mkBox(0.5,0.08,0.12,0x111111,0.5,0.5); cable.position.set(-0.7,0.98,0.4); deskG.add(cable);
deskG.position.set(1.5,0,-4.4); scene.add(deskG);

// ── Monitor ───────────────────────────────────────────────────────
const monG = new THREE.Group();
// Bezel
const mBezel = mkBox(1.9,1.12,0.07,0x0e0e12,0.7,0.2); mBezel.position.y=1.05; mBezel.castShadow=true; monG.add(mBezel);
// Screen
const mScr = mkBox(1.76,0.98,0.01,0x000a18,0,0.05); mScr.position.set(0,1.05,0.04); monG.add(mScr);
// Glow layer
const mGlow = mkBox(1.7,0.92,0.008,0x001133,0,0); mGlow.material.emissive=new THREE.Color(0x0033aa); mGlow.material.emissiveIntensity=0.5; mGlow.position.set(0,1.05,0.042); monG.add(mGlow);
// Code lines on screen (visual)
for(let i=0;i<8;i++){
  const w=0.3+Math.random()*0.9;
  const cl=mkBox(w,0.022,0.003,[0x00ff99,0x4488ff,0xff6644,0xffcc00][i%4],0,0);
  cl.material.emissive=new THREE.Color([0x00ff99,0x4488ff,0xff6644,0xffcc00][i%4]); cl.material.emissiveIntensity=0.7;
  cl.position.set(-0.6+w/2+Math.random()*0.2, 1.3-i*0.07, 0.046); monG.add(cl);
}
// Stand
const mStand=mkBox(0.07,0.28,0.07,0x1e1e1e,0.7,0.3); mStand.position.y=0.46; monG.add(mStand);
const mBase=mkBox(0.55,0.04,0.32,0x191919,0.7,0.3); mBase.position.y=0.3; monG.add(mBase);
// Brand dot
const mDot=SPH(0.025,6,mat(0x00ffc8,0,0,0x00ffc8,1));
mDot.position.set(0,0.49,0.04); monG.add(mDot);
monG.position.set(1.5,0.92,-4.4+0.32); scene.add(monG);

// ── Keyboard & Mouse ──────────────────────────────────────────────
const kbG = new THREE.Group();
const kb = mkBox(1.05,0.032,0.35,0x141420,0.3,0.6); kb.position.y=0; kbG.add(kb);
// Key rows
for(let r=0;r<3;r++) for(let k=0;k<12;k++){
  const key=mkBox(0.068,0.012,0.068,k%4===0?0x002244:0x0a0a18,0,0.5);
  key.position.set(-0.44+k*0.08, 0.022, -0.1+r*0.1); kbG.add(key);
}
kbG.position.set(1.5,0.958,-4.15);
scene.add(kbG);

const mouse = mkBox(0.1,0.035,0.14,0x131320,0.4,0.5); mouse.position.set(2.2,0.957,-4.15); scene.add(mouse);

// ── Chair ─────────────────────────────────────────────────────────
const chairG = new THREE.Group();
const cSeat = mkBox(0.72,0.07,0.68,0x0d0d1e,0.05,0.7); cSeat.position.y=0.57; cSeat.castShadow=true; chairG.add(cSeat);
const cBack = mkBox(0.72,0.75,0.07,0x0d0d1e,0.05,0.7); cBack.position.set(0,0.97,-0.31); cBack.castShadow=true; chairG.add(cBack);
// Backrest logo
const cLogo = mkBox(0.3,0.04,0.01,0x00ffc8,0,0); cLogo.material.emissive=new THREE.Color(0x00ffc8); cLogo.material.emissiveIntensity=0.4; cLogo.position.set(0,1.05,-0.27); chairG.add(cLogo);
const cPole = mkCyl(0.025,0.025,0.52,8,0x2a2a2a,0.7,0.3); cPole.position.y=0.28; chairG.add(cPole);
const cBase = mkCyl(0.38,0.38,0.032,5,0x1e1e1e,0.7,0.3); cBase.position.y=0.016; chairG.add(cBase);

function updateUI(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active-btn',i===current));
  sectionLabel.textContent=sections[current].label;
  sectionLabel.style.opacity=current===0?'0':'1';
  heroText.style.opacity=current===0?'1':'0';
  scrollHintEl.style.opacity=current===0?'1':'0';
  infoPanel.innerHTML=panels[current];
  infoPanel.style.opacity=current===0?'0':'1';
  sectionNav.style.opacity=current===0?'0':'1';
}

// Scroll
let scrollAcc=0, lastScroll=0;
window.addEventListener('wheel',e=>{
  const now=Date.now();
  if(now-lastScroll<600){ scrollAcc+=e.deltaY; } else { scrollAcc=e.deltaY; }
  lastScroll=now;
  if(Math.abs(scrollAcc)>80){ goTo(current+(scrollAcc>0?1:-1)); scrollAcc=0; }
});

let touchSt=0;
window.addEventListener('touchstart',e=>{ touchSt=e.touches[0].clientY; });
window.addEventListener('touchend',e=>{ const d=touchSt-e.changedTouches[0].clientY; if(Math.abs(d)>45) goTo(current+(d>0?1:-1)); });

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'||e.key==='s'||e.key==='d') goTo(current+1);
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'||e.key==='w'||e.key==='a') goTo(current-1);
});

// ── Animation loop ────────────────────────────────────────────────
let time=0;
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  time+=dt;

  // Camera lerp
  camera.position.x=lerp(camera.position.x,tCam.x,0.035);
  camera.position.y=lerp(camera.position.y,tCam.y,0.035);
  camera.position.z=lerp(camera.position.z,tCam.z,0.035);
  lookTarget.x=lerp(lookTarget.x,tLook.x,0.035);
  lookTarget.y=lerp(lookTarget.y,tLook.y,0.035);
  lookTarget.z=lerp(lookTarget.z,tLook.z,0.035);
  camera.lookAt(lookTarget);

  // Character idle
  charG.position.y=Math.sin(time*1.0)*0.012;
  charG.rotation.y=Math.sin(time*0.4)*0.06;

  // Screen flicker
  screenGlowL.intensity=0.9+Math.sin(time*4.0)*0.15;
  
  // Lamp warmth pulse
  lampL.intensity=0.8+Math.sin(time*1.5)*0.05;

  // Point light gentle sway
  pLight.position.x=-2+Math.sin(time*0.6)*0.4;
  pLight.position.z=1+Math.cos(time*0.4)*0.3;

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
