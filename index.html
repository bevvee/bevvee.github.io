<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Amine El Aazzouzi · Portfolio</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100vh; overflow:hidden; background:#060610; color:#fff; font-family:'Segoe UI',system-ui,sans-serif; }
#canvas-container { position:fixed; top:0; left:0; width:100%; height:100vh; z-index:0; }
#ui { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }

#name-top {
  position:absolute; top:20px; left:24px;
  font-size:10px; letter-spacing:4px; color:#333; text-transform:uppercase;
}

#hero-text {
  position:absolute; top:50%; left:5%;
  transform:translateY(-50%);
  pointer-events:none; transition:opacity 0.6s ease;
}
#hero-text .eyebrow {
  font-size:10px; letter-spacing:4px; color:#00ffc8;
  text-transform:uppercase; margin-bottom:12px;
  display:flex; align-items:center; gap:10px;
}
#hero-text .eyebrow::before { content:''; display:block; width:28px; height:1px; background:#00ffc8; }
#hero-text h1 {
  font-size:clamp(28px,4.5vw,66px); font-weight:900;
  line-height:1.05; text-transform:uppercase; letter-spacing:-2px;
}
#hero-text h1 .accent { color:#00ffc8; }
#hero-text .role { margin-top:14px; font-size:12px; color:#555; letter-spacing:2px; text-transform:uppercase; }
#hero-text .company { margin-top:5px; font-size:11px; color:#333; letter-spacing:1px; }
#hero-text .company span { color:#00ffc8; }

#scroll-hint {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  text-align:center; font-size:9px; letter-spacing:4px; color:#2a2a2a;
  text-transform:uppercase; animation:bob 2.5s infinite ease-in-out; transition:opacity 0.5s;
}
@keyframes bob {
  0%,100%{ transform:translateX(-50%) translateY(0); }
  50%{ transform:translateX(-50%) translateY(7px); }
}

#section-label {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  background:rgba(0,255,200,0.06); border:1px solid rgba(0,255,200,0.2);
  color:#00ffc8; padding:5px 20px; font-size:9px; letter-spacing:4px;
  text-transform:uppercase; border-radius:30px; opacity:0;
  transition:opacity 0.5s; white-space:nowrap;
}

#info-panel {
  position:absolute; right:3%; top:50%; transform:translateY(-50%);
  width:305px; background:rgba(4,4,20,0.93);
  border:1px solid rgba(0,255,200,0.13); border-radius:16px;
  padding:22px 20px; opacity:0; transition:opacity 0.7s ease;
  pointer-events:auto; backdrop-filter:blur(22px);
  max-height:88vh; overflow-y:auto;
}
#info-panel::-webkit-scrollbar { width:2px; }
#info-panel::-webkit-scrollbar-thumb { background:#00ffc820; border-radius:2px; }

#info-panel h2 { font-size:14px; font-weight:800; color:#00ffc8; letter-spacing:3px; text-transform:uppercase; margin-bottom:2px; }
#info-panel .sub { font-size:9px; color:#333; letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; padding-bottom:13px; border-bottom:1px solid rgba(255,255,255,0.04); }

.skill-row { display:flex; align-items:center; gap:8px; margin:7px 0; }
.skill-name { font-size:10px; color:#999; width:90px; flex-shrink:0; }
.skill-bar-bg { flex:1; height:2px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
.skill-bar { height:2px; border-radius:2px; background:linear-gradient(90deg,#00ffc8,#0099ff); }
.skill-pct { font-size:9px; color:#00ffc8; width:28px; text-align:right; flex-shrink:0; }

.proj-card {
  background:rgba(0,255,200,0.025); border:1px solid rgba(0,255,200,0.08);
  border-radius:10px; padding:11px 12px; margin:7px 0; transition:border-color 0.3s;
}
.proj-card:hover { border-color:rgba(0,255,200,0.3); }
.proj-card h3 { font-size:11px; color:#eee; margin-bottom:4px; font-weight:600; }
.proj-card p { font-size:10px; color:#555; line-height:1.65; }
.tag-row { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.chip { font-size:8px; padding:2px 7px; border-radius:20px; background:rgba(0,255,200,0.07); color:#00ffc8; border:1px solid rgba(0,255,200,0.15); }

.exp-item { border-left:2px solid #00ffc8; padding-left:12px; margin:12px 0; }
.exp-item h3 { font-size:11px; color:#fff; font-weight:700; }
.exp-item .date { font-size:9px; color:#00ffc8; margin:2px 0; letter-spacing:1px; }
.exp-item p { font-size:10px; color:#555; line-height:1.55; }

.cert-card { background:rgba(255,170,0,0.03); border:1px solid rgba(255,170,0,0.13); border-radius:10px; padding:11px 12px; margin:7px 0; }
.cert-card h3 { font-size:11px; color:#ffd060; font-weight:600; margin-bottom:4px; }
.cert-card p { font-size:10px; color:#666; line-height:1.7; }

.contact-row { display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:11px; color:#777; }
.contact-row .icon { font-size:12px; width:18px; text-align:center; }
.contact-row a { color:#00ffc8; text-decoration:none; font-size:10px; }
.contact-row a:hover { text-decoration:underline; }

#scroll-progress {
  position:fixed; right:16px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:9px; z-index:20;
}
.dot {
  width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.12);
  cursor:pointer; pointer-events:auto; transition:all 0.3s; border:1px solid transparent;
}
.dot.active { background:#00ffc8; transform:scale(1.5); border-color:rgba(0,255,200,0.3); box-shadow:0 0 6px rgba(0,255,200,0.4); }

#section-nav {
  position:absolute; bottom:28px; right:3%;
  display:flex; gap:6px; opacity:0; transition:opacity 0.5s; pointer-events:auto;
}
.nav-btn {
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:6px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:20px;
  background:rgba(5,5,20,0.7); color:#555; cursor:pointer; transition:all 0.3s;
}
.nav-btn:hover, .nav-btn.active-btn { border-color:#00ffc8; color:#00ffc8; }

#loading-screen {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#060610; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 1.3s ease;
}
#loading-screen .load-name { font-size:10px; letter-spacing:6px; color:#222; text-transform:uppercase; margin-bottom:28px; }
#loading-bar-bg { width:200px; height:1px; background:rgba(255,255,255,0.04); }
#loading-bar { height:1px; background:linear-gradient(90deg,#00ffc8,#0099ff); width:0%; transition:width 0.15s linear; }
.load-pct { margin-top:12px; font-size:9px; color:#00ffc8; letter-spacing:2px; }
#model-status { margin-top:16px; font-size:9px; color:#2a2a2a; letter-spacing:2px; text-align:center; max-width:280px; }
#error-hint { display:none; margin-top:14px; font-size:9px; color:#ff5555; letter-spacing:1px; text-align:center; max-width:300px; line-height:1.7; }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="load-name">M.A. El Aazzouzi · Portfolio</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div class="load-pct" id="load-pct">0%</div>
  <div id="model-status">Initializing renderer…</div>
  <div id="error-hint"></div>
</div>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Overlay UI -->
<div id="ui">
  <div id="name-top">M.A. El Aazzouzi · 2025</div>
  <div id="section-label"></div>

  <div id="hero-text">
    <div class="eyebrow">Full-Stack Developer · Morocco</div>
    <h1>Mohammed<br>Amine<br><span class="accent">El Aazzouzi</span></h1>
    <div class="role">Web &amp; Mobile Developer</div>
    <div class="company">@ <span>Simacode</span> · Since Sep 2024</div>
  </div>

  <div id="info-panel"></div>

  <div id="scroll-hint">
    Scroll to explore
    <svg style="display:block;margin:5px auto 0;opacity:0.25" width="12" height="18" viewBox="0 0 12 18" fill="none">
      <rect x="1" y="1" width="10" height="16" rx="5" stroke="white" stroke-width="1.2"/>
      <circle cx="6" cy="5" r="1.3" fill="white"/>
    </svg>
  </div>

  <div id="section-nav">
    <div class="nav-btn" onclick="goTo(0)">Intro</div>
    <div class="nav-btn" onclick="goTo(1)">Projects</div>
    <div class="nav-btn" onclick="goTo(2)">Skills</div>
    <div class="nav-btn" onclick="goTo(3)">Contact</div>
  </div>
</div>

<!-- Dot nav -->
<div id="scroll-progress">
  <div class="dot active" onclick="goTo(0)" title="Intro"></div>
  <div class="dot" onclick="goTo(1)" title="Projects"></div>
  <div class="dot" onclick="goTo(2)" title="Skills"></div>
  <div class="dot" onclick="goTo(3)" title="Contact"></div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─────────────────────────────────────────────
//  MODEL URLS — update these if paths change
// ─────────────────────────────────────────────
const ROOM_URL      = 'https://bevvee.github.io/room/scene.gltf';
const CHARACTER_URL = 'https://bevvee.github.io/character/scene.gltf';
const SHELF_URL     = 'https://bevvee.github.io/shelf/scene.gltf';

// ─────────────────────────────────────────────
//  Loading UI helpers
// ─────────────────────────────────────────────
const loadBarEl  = document.getElementById('loading-bar');
const loadPctEl  = document.getElementById('load-pct');
const loadScreen = document.getElementById('loading-screen');
const statusEl   = document.getElementById('model-status');
const errorHint  = document.getElementById('error-hint');
let   loadValue  = 0;

function setLoad(v, msg) {
  loadValue = Math.min(100, v);
  loadBarEl.style.width = loadValue + '%';
  loadPctEl.textContent = Math.floor(loadValue) + '%';
  if (msg) statusEl.textContent = msg;
  if (loadValue >= 100) {
    setTimeout(() => {
      loadScreen.style.opacity = '0';
      setTimeout(() => { if (loadScreen.parentNode) loadScreen.remove(); }, 1400);
    }, 500);
  }
}

function showError(msg) {
  errorHint.style.display = 'block';
  errorHint.textContent   = msg;
}

// ─────────────────────────────────────────────
//  Renderer
// ─────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding    = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

// ─────────────────────────────────────────────
//  Scene
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04040e);
scene.fog        = new THREE.FogExp2(0x04040e, 0.038);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 300);
camera.position.set(0, 2.5, 8);
const lookTarget = new THREE.Vector3(0, 1.2, 0);
camera.lookAt(lookTarget);

setLoad(5, 'Scene initialised…');

// ─────────────────────────────────────────────
//  Lighting
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8899cc, 0.85));

const sunL = new THREE.DirectionalLight(0xffffff, 0.65);
sunL.position.set(5, 12, 5);
sunL.castShadow = true;
sunL.shadow.mapSize.set(1024, 1024);
sunL.shadow.camera.near   = 0.5;
sunL.shadow.camera.far    = 80;
sunL.shadow.camera.left   = sunL.shadow.camera.bottom = -18;
sunL.shadow.camera.right  = sunL.shadow.camera.top    =  18;
scene.add(sunL);

const cyanL = new THREE.PointLight(0x00ffd5, 3.0, 24);
cyanL.position.set(-2, 5, 1);
scene.add(cyanL);

const warmL = new THREE.PointLight(0xff8833, 1.4, 16);
warmL.position.set(5, 4, -2);
scene.add(warmL);

const screenL = new THREE.PointLight(0x0044ff, 2.2, 8);
screenL.position.set(2, 2, -3);
scene.add(screenL);

const rimL = new THREE.DirectionalLight(0x4422ff, 0.35);
rimL.position.set(-8, 8, -8);
scene.add(rimL);

const lampL = new THREE.PointLight(0xffddaa, 1.1, 8);
lampL.position.set(-4, 2.4, -5);
scene.add(lampL);

// ─────────────────────────────────────────────
//  Geometry helpers
// ─────────────────────────────────────────────
const _mat = (c, mx=0, rx=0.8, em=null, ei=0) => {
  const m = new THREE.MeshStandardMaterial({ color: c, metalness: mx, roughness: rx });
  if (em) { m.emissive = new THREE.Color(em); m.emissiveIntensity = ei; }
  return m;
};
const BOX = (w, h, d, m) => {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
  mesh.castShadow = true; mesh.receiveShadow = true;
  return mesh;
};
const CYL = (rt, rb, h, s, m) => {
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, s), m);
  mesh.castShadow = true;
  return mesh;
};
const SPH = (r, s, m) => new THREE.Mesh(new THREE.SphereGeometry(r, s, s), m);

// ─────────────────────────────────────────────
//  Static environment
// ─────────────────────────────────────────────

// Floor + tiles
const floor = BOX(30, 0.1, 30, _mat(0x0a0a1c, 0, 0.95));
floor.position.y = -0.05; floor.receiveShadow = true;
scene.add(floor);
for (let x = -8; x <= 8; x++) for (let z = -8; z <= 8; z++) {
  const t = BOX(0.96, 0.006, 0.96, _mat((x+z) % 2 === 0 ? 0x111124 : 0x0d0d1e, 0, 1));
  t.position.set(x, 0.001, z); scene.add(t);
}

// Walls
const backWall = BOX(22, 10, 0.12, _mat(0x080818, 0, 1)); backWall.position.set(0, 5, -8); scene.add(backWall);
const lWall    = BOX(0.12, 10, 22, _mat(0x080818, 0, 1)); lWall.position.set(-9, 5, 0);   scene.add(lWall);
const rWall    = BOX(0.12, 10, 22, _mat(0x080818, 0, 1)); rWall.position.set( 9, 5, 0);   scene.add(rWall);
const ceil     = BOX(22, 0.1, 22, _mat(0x060616, 0, 1));  ceil.position.y = 9.95;          scene.add(ceil);

// Back-wall accent lines
for (let i = 0; i < 9; i++) {
  const vl = BOX(0.011, 6.5, 0.01, _mat(0x00ffc8, 0, 0, 0x00ffc8, 0.11));
  vl.position.set(-7 + i * 1.75, 3.25, -7.92); scene.add(vl);
}

// Ceiling LED strip
for (let x = -7; x <= 7; x += 0.22) {
  const led = SPH(0.013, 4, _mat(0x00ffc8, 0, 0, 0x00ffc8, 2.2));
  led.position.set(x, 9.87, -6.5); scene.add(led);
}

// Floor LED strip (left-wall base)
for (let z = -7; z <= -2; z += 0.2) {
  const s = SPH(0.012, 4, _mat(0x7733ff, 0, 0, 0x7733ff, 1.5));
  s.position.set(-8.92, 0.07, z); scene.add(s);
}

// Rug
const rug   = BOX(4.2, 0.022, 3.0, _mat(0x280030, 0, 0.95)); rug.position.set(0, 0.007, 0.5); scene.add(rug);
const rugIn = BOX(3.7, 0.023, 2.5, _mat(0x3a0045, 0, 0.90)); rugIn.position.set(0, 0.008, 0.5); scene.add(rugIn);
for (let i = -1; i <= 1; i++) {
  const rl = BOX(3.6, 0.024, 0.012, _mat(0x00ffc8, 0, 0, 0x00ffc8, 0.07));
  rl.position.set(0, 0.01, 0.5 + i * 0.75); scene.add(rl);
}

// Back-wall poster
(function buildPoster() {
  const pg = new THREE.Group();
  pg.add(BOX(1.4, 1.8, 0.04, _mat(0x060716, 0, 0.9)));
  const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.024, 8, 32), _mat(0x00ffc8, 0, 0, 0x00ffc8, 1.2));
  ring1.position.z = 0.03; pg.add(ring1);
  const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.014, 8, 32), _mat(0x7733ff, 0, 0, 0x7733ff, 1.0));
  ring2.position.z = 0.03; pg.add(ring2);
  for (let i = 0; i < 5; i++) {
    const pl = BOX(0.8, 0.015, 0.01, _mat(i === 0 ? 0x00ffc8 : 0x334455, 0, 0, i === 0 ? 0x00ffc8 : 0x223344, i === 0 ? 0.55 : 0.2));
    pl.position.set(0, -0.37 - i * 0.11, 0.03); pg.add(pl);
  }
  pg.position.set(-2.5, 2.9, -7.92); scene.add(pg);
})();

// Desk lamp (left of shelf)
(function buildLamp() {
  const g = new THREE.Group();
  g.add(CYL(0.13, 0.15, 0.06, 14, _mat(0x1e1e1e, 0.8, 0.2)));
  const pole = CYL(0.022, 0.022, 0.95, 8, _mat(0x262626, 0.8, 0.2));
  pole.position.y = 0.49; g.add(pole);
  const shade = new THREE.Mesh(new THREE.ConeGeometry(0.19, 0.24, 12, 1, true), _mat(0xffeecc, 0, 0.7));
  shade.material.side = THREE.DoubleSide; shade.position.y = 1.0; g.add(shade);
  const bulb = SPH(0.044, 8, _mat(0xffffff, 0, 0, 0xffffaa, 3.0));
  bulb.position.y = 0.91; g.add(bulb);
  g.position.set(-3.6, 0, -4.6); scene.add(g);
})();

// Plant
(function buildPlant() {
  const g = new THREE.Group();
  g.add(CYL(0.2, 0.25, 0.34, 14, _mat(0xcc4400, 0, 0.8)));
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2;
    const l = SPH(0.13 + Math.random() * 0.08, 7, _mat(0x1a9933, 0, 0.9));
    l.scale.set(0.9, 1.4, 0.9);
    l.position.set(Math.cos(a) * 0.14, 0.53 + Math.random() * 0.2, Math.sin(a) * 0.14);
    g.add(l);
  }
  g.position.set(-5.4, 0.17, -4.8); scene.add(g);
})();

// Mini fridge
(function buildFridge() {
  const g = new THREE.Group();
  const body  = BOX(0.55, 0.75, 0.5, _mat(0x101020, 0.3, 0.5)); body.position.y = 0.375; g.add(body);
  const door  = BOX(0.53, 0.73, 0.02, _mat(0x0a0a1e, 0.2, 0.4)); door.position.set(0, 0.375, 0.255); g.add(door);
  const handle = BOX(0.3, 0.025, 0.03, _mat(0x00ffc8, 0.8, 0.2, 0x00ffc8, 0.35));
  handle.position.set(0, 0.38, 0.27); g.add(handle);
  g.position.set(-4.0, 0, -2.8); scene.add(g);
})();

// Certificates on right wall
[[2.6, -2.4], [2.6, -3.8]].forEach(([y, z], ci) => {
  const cols = [0xffaa00, 0x00ccff];
  const c = cols[ci];
  const inner = BOX(0.9, 0.68, 0.04, _mat(0x090818, 0, 0.8));
  inner.position.set(8.88, y, z); scene.add(inner);
  [0.36, -0.36].forEach(dy => {
    const f = BOX(0.94, 0.01, 0.02, _mat(c, 0.8, 0.15, c, 0.2));
    f.position.set(8.88, y + dy, z); scene.add(f);
  });
  [-0.48, 0.48].forEach(dz => {
    const sf = BOX(0.01, 0.7, 0.72, _mat(c, 0.8, 0.15, c, 0.2));
    sf.position.set(8.88, y, z + dz); scene.add(sf);
  });
  for (let l = 0; l < 3; l++) {
    const cl = BOX(0.42, 0.016, 0.01, _mat(c, 0, 0, c, 0.45));
    cl.position.set(8.87, y + 0.14 - l * 0.14, z + 0.025); scene.add(cl);
  }
});

// ─────────────────────────────────────────────
//  glTF model loading
// ─────────────────────────────────────────────
let charModel  = null;
let charMixer  = null;
let loadedCount = 0;
const TOTAL    = 3;

function onModelDone() {
  loadedCount++;
  const pct = 20 + (loadedCount / TOTAL) * 72;
  setLoad(pct, loadedCount < TOTAL
    ? `Loading models… (${loadedCount}/${TOTAL})`
    : 'Finalising scene…');
  if (loadedCount === TOTAL) setTimeout(() => setLoad(100, 'Portfolio ready!'), 500);
}

function onModelFail(name, err) {
  console.warn('GLTF load failed:', name, err);
  showError(`"${name}" failed to load — check CORS headers and that the file exists at the correct path.`);
  onModelDone();
}

function loadModels() {
  const loader = new THREE.GLTFLoader();

  if (THREE.DRACOLoader) {
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
    loader.setDRACOLoader(draco);
  }

  setLoad(15, 'Loading room…');

  // ── ROOM ──────────────────────────────────
  loader.load(ROOM_URL, gltf => {
    const model = gltf.scene;

    // Auto-scale to fit ~16 units
    const box = new THREE.Box3().setFromObject(model);
    const sz  = new THREE.Vector3(); box.getSize(sz);
    const sc  = 16 / Math.max(sz.x, sz.y, sz.z);
    model.scale.setScalar(sc);

    box.setFromObject(model);
    const ctr = new THREE.Vector3(); box.getCenter(ctr);
    model.position.set(-ctr.x, -box.min.y, -ctr.z);

    model.traverse(n => {
      if (n.isMesh) {
        n.castShadow = true; n.receiveShadow = true;
        if (n.material) n.material.envMapIntensity = 0.55;
      }
    });

    scene.add(model);
    setLoad(38, 'Room loaded — loading character…');
    onModelDone();
  },
  xhr => { if (xhr.total) setLoad(15 + (xhr.loaded / xhr.total) * 22, 'Loading room…'); },
  err => onModelFail('room', err));

  // ── CHARACTER ─────────────────────────────
  loader.load(CHARACTER_URL, gltf => {
    charModel = gltf.scene;

    const box = new THREE.Box3().setFromObject(charModel);
    const sz  = new THREE.Vector3(); box.getSize(sz);
    const sc  = 2.3 / Math.max(sz.x, sz.y, sz.z);
    charModel.scale.setScalar(sc);

    box.setFromObject(charModel);
    const ctr = new THREE.Vector3(); box.getCenter(ctr);
    charModel.position.set(
      -ctr.x * sc - 0.3,
      -box.min.y,
      -ctr.z * sc + 0.8
    );

    charModel.traverse(n => {
      if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
    });

    if (gltf.animations && gltf.animations.length > 0) {
      charMixer = new THREE.AnimationMixer(charModel);
      const clip = gltf.animations.find(a =>
        /idle|stand|breath/i.test(a.name)
      ) || gltf.animations[0];
      charMixer.clipAction(clip).play();
    }

    scene.add(charModel);
    setLoad(62, 'Character loaded — loading shelf…');
    onModelDone();
  },
  xhr => { if (xhr.total) setLoad(38 + (xhr.loaded / xhr.total) * 24, 'Loading character…'); },
  err => onModelFail('character', err));

  // ── SHELF ─────────────────────────────────
  loader.load(SHELF_URL, gltf => {
    const model = gltf.scene;

    const box = new THREE.Box3().setFromObject(model);
    const sz  = new THREE.Vector3(); box.getSize(sz);
    const sc  = 3.4 / Math.max(sz.x, sz.y, sz.z);
    model.scale.setScalar(sc);

    box.setFromObject(model);
    const ctr = new THREE.Vector3(); box.getCenter(ctr);
    model.position.set(
      -6.0 - ctr.x * sc,
      -box.min.y,
      -4.5 - ctr.z * sc
    );

    model.traverse(n => {
      if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
    });

    // Colourful books sitting on the shelves
    addBooks(model.position, box, sc);

    scene.add(model);
    setLoad(88, 'Shelf loaded…');
    onModelDone();
  },
  xhr => { if (xhr.total) setLoad(62 + (xhr.loaded / xhr.total) * 26, 'Loading shelf…'); },
  err => onModelFail('shelf', err));
}

function addBooks(shelfPos, shelfBox, sc) {
  const palette = [0xff1a3d, 0x0066ff, 0x00cc44, 0xff9900, 0xaa00ee, 0xff5500, 0x00ccff, 0xff0066, 0x44ff88];
  const totalH  = (shelfBox.max.y - shelfBox.min.y) * sc;
  [0.27, 0.50, 0.73, 0.90].forEach((frac, row) => {
    const y = shelfPos.y + frac * totalH;
    for (let b = 0; b < 7; b++) {
      const bh = 0.28 + Math.random() * 0.14;
      const bw = 0.09 + Math.random() * 0.04;
      const bk = BOX(bw, bh, 0.24, _mat(palette[(b + row * 3) % palette.length], 0, 0.7));
      bk.position.set(shelfPos.x - 0.65 + b * 0.23, y + bh / 2, shelfPos.z + 0.06);
      scene.add(bk);
    }
  });
}

function updateUI() {
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active-btn', i === current));
  sectionLabel.textContent  = sections[current].label;
  sectionLabel.style.opacity = current === 0 ? '0' : '1';
  heroText.style.opacity     = current === 0 ? '1' : '0';
  scrollHintEl.style.opacity = current === 0 ? '1' : '0';

  infoPanel.style.opacity    = current === 0 ? '0' : '1';
  sectionNav.style.opacity   = current === 0 ? '0' : '1';
}

// ─────────────────────────────────────────────
//  Input
// ─────────────────────────────────────────────
let scrollAcc = 0, lastScroll = 0;
window.addEventListener('wheel', e => {
  const now = Date.now();
  scrollAcc = (now - lastScroll < 700) ? scrollAcc + e.deltaY : e.deltaY;
  lastScroll = now;
  if (Math.abs(scrollAcc) > 80) { goTo(current + (scrollAcc > 0 ? 1 : -1)); scrollAcc = 0; }
}, { passive: true });

let touchSt = 0;
window.addEventListener('touchstart', e => { touchSt = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend',   e => {
  const d = touchSt - e.changedTouches[0].clientY;
  if (Math.abs(d) > 45) goTo(current + (d > 0 ? 1 : -1));
}, { passive: true });

window.addEventListener('keydown', e => {
  if (['ArrowDown','ArrowRight','s','d'].includes(e.key)) goTo(current + 1);
  if (['ArrowUp','ArrowLeft','w','a'].includes(e.key))   goTo(current - 1);
});

// ─────────────────────────────────────────────
//  Render loop
// ─────────────────────────────────────────────
let time = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  // Smooth camera lerp
  camera.position.x = lerp(camera.position.x, tCam.x, 0.032);
  camera.position.y = lerp(camera.position.y, tCam.y, 0.032);
  camera.position.z = lerp(camera.position.z, tCam.z, 0.032);
  lookTarget.x      = lerp(lookTarget.x, tLook.x, 0.032);
  lookTarget.y      = lerp(lookTarget.y, tLook.y, 0.032);
  lookTarget.z      = lerp(lookTarget.z, tLook.z, 0.032);
  camera.lookAt(lookTarget);

  // Character idle animation
  if (charModel) {
    charModel.position.y += Math.sin(time * 0.95) * 0.00016;
    charModel.rotation.y  = Math.sin(time * 0.38) * 0.06;
  }
  if (charMixer) charMixer.update(dt);

  // Dynamic light pulses
  screenL.intensity   = 1.5 + Math.sin(time * 4.1) * 0.25;
  cyanL.position.x    = -2  + Math.sin(time * 0.5) * 0.55;
  cyanL.position.z    =  1  + Math.cos(time * 0.35) * 0.4;
  lampL.intensity     = 1.0 + Math.sin(time * 1.3) * 0.06;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

    const d = document.createElement('script');

    d.onload  = loadModels;

  };
  s.onerror = () => {
    showError('Failed to load GLTFLoader from CDN. Check your internet connection.');
    setLoad(100, 'Fallback mode');
  };
  document.head.appendChild(s);
})();
